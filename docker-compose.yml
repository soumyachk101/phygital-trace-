version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: phygital-postgres
    environment:
      POSTGRES_USER: phygital
      POSTGRES_PASSWORD: phygital_dev_password
      POSTGRES_DB: phygital_trace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phygital"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phygital-network

  redis:
    image: redis:7-alpine
    container_name: phygital-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phygital-network

volumes:
  postgres_data:
  redis_data:

networks:
  phygital-network:
    driver: bridge
